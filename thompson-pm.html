<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thompson PM Tizimi</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
:root{
  --bg:#f5f4f0;--card:#fff;--text:#111;--text2:#666;--border:rgba(0,0,0,0.12);
  --surface:#f0ede8;--purple:#534AB7;--purple-bg:#EEEDFE;--purple-text:#3C3489;
  --green-bg:#EAF3DE;--green-text:#27500A;--green:#3B6D11;
  --blue-bg:#E6F1FB;--blue-text:#0C447C;
  --amber-bg:#FAEEDA;--amber-text:#633806;
  --red-bg:#FCEBEB;--red-text:#791F1F;
  --teal-bg:#E1F5EE;--teal-text:#085041;
  --gray-bg:#F1EFE8;--gray-text:#444441;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1a1a1a;--card:#242424;--text:#eee;--text2:#999;--border:rgba(255,255,255,0.12);
  --surface:#2a2a2a;
}}
body{background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
input,select,textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);font-family:inherit;font-size:13px;outline:none;transition:border 0.15s}
input:focus,select:focus,textarea:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(83,74,183,0.12)}
button{font-family:inherit;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--text2);border-radius:8px;padding:7px 14px;font-size:13px;transition:all 0.15s}
button:hover{background:var(--surface)}
button:active{transform:scale(0.98)}
.btn-p{background:var(--purple)!important;color:#fff!important;border-color:var(--purple)!important}
.btn-p:hover{background:#3C3489!important}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px}
.metric{background:var(--surface);border-radius:8px;padding:12px 14px}
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap;border:1px solid transparent}
.b-purple{background:var(--purple-bg);color:var(--purple-text);border-color:var(--purple)}
.b-blue{background:var(--blue-bg);color:var(--blue-text);border-color:#378ADD}
.b-green{background:var(--green-bg);color:var(--green-text);border-color:#639922}
.b-amber{background:var(--amber-bg);color:var(--amber-text);border-color:#BA7517}
.b-red{background:var(--red-bg);color:var(--red-text);border-color:#E24B4A}
.b-teal{background:var(--teal-bg);color:var(--teal-text);border-color:#1D9E75}
.b-gray{background:var(--gray-bg);color:var(--gray-text);border-color:#888}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.nav{background:var(--card);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;padding:0 8px}
.nav::-webkit-scrollbar{height:0}
.nbtn{padding:10px 12px;font-size:13px;border:none;background:none;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;border-radius:0;white-space:nowrap;transition:all 0.15s}
.nbtn.active{color:var(--purple);border-bottom-color:var(--purple);font-weight:500}
.content{padding:16px;max-width:960px;margin:0 auto}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0;font-size:12px}
.pg-wrap{display:flex;align-items:center;gap:8px}
.pg-track{flex:1;height:6px;background:rgba(128,128,128,0.15);border-radius:3px;overflow:hidden}
.pg-fill{height:100%;border-radius:3px;transition:width 0.4s}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:7px 8px;text-align:left;color:var(--text2);font-weight:500;border-bottom:1px solid var(--border)}
td{padding:8px;border-bottom:1px solid rgba(0,0,0,0.05);color:var(--text)}
tr:last-child td{border-bottom:none}
.fl{display:flex}.fc{display:flex;align-items:center}.fbt{display:flex;align-items:center;justify-content:space-between}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
.gap8{gap:8px}.gap10{gap:10px}.gap12{gap:12px}.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}
.lbl{font-size:11px;color:var(--text2);display:block;margin-bottom:3px;margin-top:8px}
.lbl:first-child{margin-top:0}
.pct-g{color:var(--green);font-weight:600}
.pct-m{color:var(--purple);font-weight:600}
.pct-l{color:#854F0B;font-weight:600}
.hidden{display:none!important}
.story-box{padding:10px;background:var(--surface);border-radius:8px;font-size:13px;line-height:1.5}
.tag-f{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500;background:var(--blue-bg);color:var(--blue-text)}
.tag-n{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500;background:var(--purple-bg);color:var(--purple-text)}
.tag-b{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500;background:var(--green-bg);color:var(--green-text)}
.saved{color:var(--green);font-size:12px;margin-left:8px}
.section-title{font-size:15px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.chip{padding:5px 13px;font-size:12px;border-radius:20px;border:1px solid var(--border);cursor:pointer;background:var(--card);color:var(--text2);font-family:inherit}
.chip.on{background:var(--purple);color:#fff;border-color:var(--purple)}
textarea{resize:vertical;min-height:80px;line-height:1.5}
.overlay{background:rgba(0,0,0,0.08);border:1px solid var(--purple);border-radius:12px;padding:16px;margin-top:12px}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(0,0,0,0.05);font-size:13px}
.info-row:last-child{border-bottom:none}
.info-label{color:var(--text2)}
.info-val{font-weight:500}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="pg-login">
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px">
    <div class="card" style="width:340px;padding:32px">
      <div style="text-align:center;margin-bottom:24px">
        <div style="font-size:22px;font-weight:700"><span style="color:var(--purple)">Thompson</span> PM</div>
        <div style="font-size:13px;color:var(--text2);margin-top:6px">Boshqaruv tizimi</div>
      </div>
      <label class="lbl">Login</label>
      <input id="li" placeholder="Loginingizni kiriting" autocomplete="username"/>
      <label class="lbl">Parol</label>
      <input id="lp" type="password" placeholder="Parolni kiriting" autocomplete="current-password"/>
      <div id="le" class="hidden" style="color:#A32D2D;font-size:12px;margin-top:8px;padding:8px;background:var(--red-bg);border-radius:6px"><i class="ti ti-alert-circle"></i> Login yoki parol noto'g'ri</div>
      <button class="btn-p" onclick="doLogin()" style="width:100%;margin-top:16px;padding:11px;font-size:14px;font-weight:500">Kirish</button>
      <div style="margin-top:16px;padding:12px;background:var(--surface);border-radius:8px;font-size:11px;color:var(--text2);line-height:1.8">
        <div style="font-weight:500;margin-bottom:4px;color:var(--text)">Demo loginlar:</div>
        admin / admin123 &nbsp;·&nbsp; u2 / pass123<br>
        u3 / pass123 &nbsp;·&nbsp; u5 / pass123
      </div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="pg-app" class="hidden">
  <div class="topbar">
    <div style="font-size:16px;font-weight:700"><span style="color:var(--purple)">Thompson</span> PM</div>
    <div class="fc gap12">
      <div id="ta" class="avatar" style="width:32px;height:32px"></div>
      <div>
        <div id="tn" style="font-size:13px;font-weight:600"></div>
        <div id="tb" style="font-size:11px;color:var(--text2)"></div>
      </div>
      <button onclick="doLogout()" style="font-size:12px;padding:5px 12px"><i class="ti ti-logout"></i> Chiqish</button>
    </div>
  </div>
  <div class="nav" id="mnav"></div>
  <div class="content" id="mcontent"></div>
</div>

<script>
// ── CONSTANTS ──────────────────────────────────────────────────────────────
const MONTHS=["Yanvar","Fevral","Mart","Aprel","May","Iyun","Iyul","Avgust","Sentabr","Oktabr","Noyabr","Dekabr"];
const BRANCH={fergana:"Farg'ona",namangan:"Namangan",both:"Ikkala filial"};
const CAT={marketing:"Marketing",operation:"Operatsion",academic:"Akademik",general:"Umumiy"};
const CAT_COL={marketing:"purple",operation:"teal",academic:"blue",general:"gray"};
const ROLE_COL={admin:"red",manager:"amber",staff:"gray"};
const today=()=>new Date().toISOString().slice(0,10);
const curMon=new Date().getMonth();
const curWk=Math.ceil(new Date().getDate()/7);
const fmt=n=>Math.round(n||0).toLocaleString("uz-UZ");
const pct=(a,b)=>b>0?Math.min(999,Math.round(a/b*100)):0;
const uid=()=>"id"+Date.now()+Math.random().toString(36).slice(2,6);
const pcls=p=>p>=80?"pct-g":p>=50?"pct-m":"pct-l";
const pgCol=p=>p>=80?"#3B6D11":p>=50?"#534AB7":"#BA7517";

// ── DEFAULT DATA ───────────────────────────────────────────────────────────
const DEFAULT={
  users:[
    {id:"admin",name:"Mirzohid",pass:"admin123",role:"admin",branch:"both"},
    {id:"u2",name:"Dilnoza",pass:"pass123",role:"staff",branch:"fergana"},
    {id:"u3",name:"Sardor",pass:"pass123",role:"staff",branch:"namangan"},
    {id:"u4",name:"Gulnora",pass:"pass123",role:"staff",branch:"fergana"},
    {id:"u5",name:"Alisher",pass:"pass123",role:"manager",branch:"namangan"},
  ],
  tasks:[
    {id:"t1",title:"Instagram post: iyul aksiyasi",cat:"marketing",branch:"fergana",assignee:"u2",status:"open",createdBy:"admin",story:[]},
    {id:"t2",title:"Namangan sinf jadvali yangilash",cat:"operation",branch:"namangan",assignee:"u3",status:"open",createdBy:"admin",story:[]},
    {id:"t3",title:"O'quv dasturi yangilash",cat:"academic",branch:"both",assignee:"u4",status:"open",createdBy:"admin",story:[]},
    {id:"t4",title:"WOM referal tizimi ishga tushirish",cat:"marketing",branch:"both",assignee:"u5",status:"done",createdBy:"admin",story:[{by:"u5",at:"2025-06-05",note:"Referal bonus tizimi ishga tushirildi. 3 ta yangi o'quvchi jalb qilindi."}]},
    {id:"t5",title:"Ota-onalar uchun ochiq dars e'lon",cat:"general",branch:"namangan",assignee:"u3",status:"open",createdBy:"admin",story:[]},
  ],
  daily:[
    {id:"d1",date:"2025-06-07",branch:"fergana",week:1,visitors:9,contracts:5,payments:3,revenue:10000000,debt:2000000,createdBy:"u2"},
    {id:"d2",date:"2025-06-06",branch:"namangan",week:1,visitors:12,contracts:7,payments:6,revenue:15000000,debt:1500000,createdBy:"u3"},
    {id:"d3",date:"2025-06-05",branch:"fergana",week:1,visitors:7,contracts:4,payments:4,revenue:9000000,debt:500000,createdBy:"u2"},
    {id:"d4",date:"2025-06-04",branch:"namangan",week:1,visitors:15,contracts:9,payments:8,revenue:18000000,debt:1000000,createdBy:"u5"},
  ],
  plans:{
    "fergana-2025-06-visitors":120,"fergana-2025-06-contracts":80,"fergana-2025-06-revenue":200000000,
    "namangan-2025-06-visitors":160,"namangan-2025-06-contracts":110,"namangan-2025-06-revenue":280000000,
  }
};

// ── LOCALSTORAGE ───────────────────────────────────────────────────────────
function loadState(){
  try{
    const s=localStorage.getItem("thompson_pm_v1");
    if(s) return JSON.parse(s);
  }catch(e){}
  return JSON.parse(JSON.stringify(DEFAULT));
}
function saveState(){
  try{localStorage.setItem("thompson_pm_v1",JSON.stringify(S));}catch(e){}
}
let S=loadState();

// ── UI HELPERS ─────────────────────────────────────────────────────────────
const AV_COLS=["#EEEDFE:#3C3489","#E1F5EE:#085041","#E6F1FB:#0C447C","#EAF3DE:#27500A","#FAEEDA:#633806","#FBEAF0:#72243E"];
function avColor(name){const c=AV_COLS[(name||"A").charCodeAt(0)%AV_COLS.length].split(":");return c}
function av(name,sz=32){const c=avColor(name);const ini=(name||"?").split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();return`<div class="avatar" style="width:${sz}px;height:${sz}px;background:${c[0]};color:${c[1]};font-size:${Math.round(sz*0.34)}px">${ini}</div>`}
function badge(cls,txt){return`<span class="badge b-${cls}">${txt}</span>`}
function branchBadge(br){return badge(br==="fergana"?"blue":br==="namangan"?"purple":"green",BRANCH[br]||br)}
function pg(val,max){const p=pct(val,max);return`<div class="pg-wrap"><div class="pg-track"><div class="pg-fill" style="width:${p}%;background:${pgCol(p)}"></div></div><span style="font-size:12px;min-width:38px;text-align:right" class="${pcls(p)}">${p}%</span></div>`}

// ── AUTH ───────────────────────────────────────────────────────────────────
let CU=null, curTab="dashboard", taskFilter="all", planMon=curMon;
let storyTaskId=null, viewStoryId=null, showAddTask=false, showAddUser=false;

function doLogin(){
  const id=document.getElementById("li").value.trim();
  const pass=document.getElementById("lp").value;
  const u=S.users.find(u=>u.id===id&&u.pass===pass);
  const err=document.getElementById("le");
  if(!u){err.classList.remove("hidden");return;}
  err.classList.add("hidden");
  CU=u; initApp();
}
document.getElementById("lp").addEventListener("keydown",e=>{if(e.key==="Enter")doLogin()});

function doLogout(){
  CU=null;storyTaskId=null;viewStoryId=null;showAddTask=false;showAddUser=false;taskFilter="all";
  document.getElementById("pg-login").classList.remove("hidden");
  document.getElementById("pg-app").classList.add("hidden");
}

function initApp(){
  document.getElementById("pg-login").classList.add("hidden");
  document.getElementById("pg-app").classList.remove("hidden");
  const c=avColor(CU.name);const ini=CU.name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
  const av_el=document.getElementById("ta");
  av_el.textContent=ini;av_el.style.background=c[0];av_el.style.color=c[1];av_el.style.width="32px";av_el.style.height="32px";
  document.getElementById("tn").textContent=CU.name;
  document.getElementById("tb").textContent=(BRANCH[CU.branch]||CU.branch)+" · "+CU.role;
  buildNav();showTab("dashboard");
}

const isAdm=()=>CU.role==="admin"||CU.role==="manager";
const vBranches=()=>CU.branch==="both"?["fergana","namangan"]:[CU.branch];

function buildNav(){
  const tabs=[
    {id:"dashboard",label:"Dashboard",icon:"ti-layout-dashboard"},
    {id:"tasks",label:"Vazifalar",icon:"ti-checkbox"},
    {id:"daily",label:"Kunlik fakt",icon:"ti-calendar-stats"},
    {id:"story",label:"Tarix",icon:"ti-history"},
  ];
  if(isAdm()){
    tabs.push({id:"plans",label:"Rejalar",icon:"ti-target"});
    tabs.push({id:"users",label:"Xodimlar",icon:"ti-users"});
  }
  document.getElementById("mnav").innerHTML=tabs.map(t=>`<button class="nbtn" id="nb-${t.id}" onclick="showTab('${t.id}')"><i class="ti ${t.icon}"></i> ${t.label}</button>`).join("");
}

function showTab(id){
  curTab=id;
  document.querySelectorAll(".nbtn").forEach(b=>b.classList.remove("active"));
  const nb=document.getElementById("nb-"+id);if(nb)nb.classList.add("active");
  const c=document.getElementById("mcontent");
  const renders={dashboard:renderDash,tasks:renderTasks,daily:renderDaily,plans:renderPlans,users:renderUsers,story:renderStory};
  c.innerHTML=(renders[id]||renderDash)();
}

// ── DASHBOARD ──────────────────────────────────────────────────────────────
function renderDash(){
  const mon=`2025-${String(curMon+1).padStart(2,"0")}`;
  let h="";
  for(const br of vBranches()){
    const es=S.daily.filter(d=>d.branch===br&&d.date.startsWith(mon));
    const pV=S.plans[`${br}-${mon}-visitors`]||0,pC=S.plans[`${br}-${mon}-contracts`]||0,pR=S.plans[`${br}-${mon}-revenue`]||0;
    const fV=es.reduce((s,d)=>s+d.visitors,0),fC=es.reduce((s,d)=>s+d.contracts,0),fR=es.reduce((s,d)=>s+d.revenue,0);
    const debt=es.reduce((s,d)=>s+d.debt,0);
    const tEs=es.filter(d=>d.date===today());
    const tR=tEs.reduce((s,d)=>s+d.revenue,0),tP=tEs.reduce((s,d)=>s+d.payments,0);
    const wEs=es.filter(d=>d.week===curWk);
    const wR=wEs.reduce((s,d)=>s+d.revenue,0),wC=wEs.reduce((s,d)=>s+d.contracts,0);
    const pRpct=pct(fR,pR);
    h+=`<div class="mb16">
      <div class="fc gap8 mb12">
        <i class="ti ti-building" style="color:var(--purple);font-size:18px"></i>
        <span class="section-title" style="margin:0">${BRANCH[br]}</span>
        ${badge(br==="fergana"?"blue":"purple",MONTHS[curMon])}
        <span class="badge ${pRpct>=80?"b-green":pRpct>=50?"b-purple":"b-amber"}">Oy: ${pRpct}%</span>
      </div>
      <div class="g4 mb12">
        <div class="metric"><div style="font-size:11px;color:var(--text2);margin-bottom:4px">Bugungi tushum</div><div style="font-size:20px;font-weight:600">${fmt(tR)}</div><div style="font-size:11px;color:var(--text2);margin-top:2px">${tP} ta to'lov</div></div>
        <div class="metric"><div style="font-size:11px;color:var(--text2);margin-bottom:4px">Oylik tushum</div><div style="font-size:20px;font-weight:600">${fmt(fR)}</div><div style="font-size:11px;color:var(--text2);margin-top:2px">Plan: ${fmt(pR)}</div></div>
        <div class="metric"><div style="font-size:11px;color:var(--text2);margin-bottom:4px">Jami qarz</div><div style="font-size:20px;font-weight:600;color:#A32D2D">${fmt(debt)}</div><div style="font-size:11px;color:var(--text2);margin-top:2px">Yig'ilgan</div></div>
        <div class="metric"><div style="font-size:11px;color:var(--text2);margin-bottom:4px">${curWk}-hafta</div><div style="font-size:20px;font-weight:600">${fmt(wR)}</div><div style="font-size:11px;color:var(--text2);margin-top:2px">${wC} shartnoma</div></div>
      </div>
      <div class="card mb8">
        <div style="font-size:13px;font-weight:600;margin-bottom:14px">Oylik plan / fakt</div>
        <div class="mb8"><div class="fbt mb8" style="font-size:12px;color:var(--text2)"><span>Tashrif</span><span>${fV} / ${pV} kishi</span></div>${pg(fV,pV)}</div>
        <div class="mb8"><div class="fbt mb8" style="font-size:12px;color:var(--text2)"><span>Shartnoma</span><span>${fC} / ${pC} ta</span></div>${pg(fC,pC)}</div>
        <div><div class="fbt mb8" style="font-size:12px;color:var(--text2)"><span>Tushum</span><span>${fmt(fR)} / ${fmt(pR)} so'm</span></div>${pg(fR,pR)}</div>
      </div>
      ${wkTable(br,mon,es)}
    </div>`;
  }
  if(vBranches().length>1) h+=staffPerf(mon);
  return h;
}

function wkTable(br,mon,es){
  const pR=(S.plans[`${br}-${mon}-revenue`]||0)/4;
  const pC=(S.plans[`${br}-${mon}-contracts`]||0)/4;
  let rows=[1,2,3,4].map(w=>{
    const we=es.filter(d=>d.week===w);
    const r=we.reduce((s,d)=>s+d.revenue,0),c=we.reduce((s,d)=>s+d.contracts,0),v=we.reduce((s,d)=>s+d.visitors,0),db=we.reduce((s,d)=>s+d.debt,0);
    const p=pct(r,pR),pc=pct(c,pC);
    return`<tr style="background:${w===curWk?"var(--surface)":"transparent"}">
      <td style="font-weight:${w===curWk?600:400}">${w}-hafta${w===curWk?` <span class="badge b-purple" style="font-size:10px">hozir</span>`:""}</td>
      <td>${v}</td><td><span class="${pcls(pc)}">${c}</span></td>
      <td style="color:#0F6E56;font-weight:500">${fmt(r)}</td>
      <td style="color:#A32D2D">${fmt(db)}</td>
      <td><span class="${pcls(p)}">${p}%</span></td>
    </tr>`;
  }).join("");
  return`<div class="card"><div style="font-size:13px;font-weight:600;margin-bottom:10px">Haftalik ko'rsatkichlar</div><div style="overflow-x:auto"><table style="min-width:500px"><thead><tr><th>Hafta</th><th>Tashrif</th><th>Shartnoma</th><th>Tushum (so'm)</th><th>Qarz (so'm)</th><th>Rej.%</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
}

function staffPerf(mon){
  const data=S.users.filter(u=>u.role!=="admin").map(u=>{
    const ts=S.tasks.filter(t=>t.assignee===u.id);
    const done=ts.filter(t=>t.status==="done").length,total=ts.length;
    const rev=S.daily.filter(d=>d.createdBy===u.id&&d.date.startsWith(mon)).reduce((s,d)=>s+d.revenue,0);
    return{...u,done,total,rev,rate:total>0?pct(done,total):0};
  }).sort((a,b)=>b.rate-a.rate||b.rev-a.rev);
  return`<div class="card mb16"><div style="font-size:13px;font-weight:600;margin-bottom:14px"><i class="ti ti-award" style="color:var(--purple)"></i> Xodimlar samaradorligi</div>
  ${data.map((u,i)=>`<div class="fc gap10 mb12">
    <span style="font-size:13px;color:var(--text2);width:18px;text-align:right">${i+1}</span>
    ${av(u.name,32)}
    <div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:500">${u.name}</div><div style="font-size:11px;color:var(--text2)">${BRANCH[u.branch]}</div></div>
    <div style="font-size:12px;color:var(--text2);text-align:right;margin-right:8px"><div>${u.done}/${u.total} vazifa</div><div style="font-size:11px">${fmt(u.rev)} so'm</div></div>
    <div style="width:90px">${pg(u.done,u.total||1)}</div>
  </div>`).join("")}
  </div>`;
}

// ── TASKS ──────────────────────────────────────────────────────────────────
function renderTasks(){
  const cats=["all","marketing","operation","academic","general"];
  const myTasks=isAdm()
    ?S.tasks.filter(t=>taskFilter==="all"||t.cat===taskFilter).filter(t=>vBranches().includes(t.branch)||t.branch==="both")
    :S.tasks.filter(t=>t.assignee===CU.id);

  const filters=cats.map(c=>`<button class="chip ${taskFilter===c?"on":""}" onclick="setTF('${c}')">${c==="all"?"Barchasi":CAT[c]}</button>`).join("");

  let addForm="";
  if(showAddTask&&isAdm()){
    addForm=`<div class="card mb12" style="border-color:var(--purple)">
      <div style="font-size:13px;font-weight:600;margin-bottom:12px"><i class="ti ti-plus-circle" style="color:var(--purple)"></i> Yangi vazifa</div>
      <label class="lbl">Vazifa nomi *</label><input id="nt-t" placeholder="Nima qilish kerak?"/>
      <div class="g2 mb8" style="margin-top:8px">
        <div><label class="lbl">Bo'lim</label><select id="nt-c"><option value="marketing">Marketing</option><option value="operation">Operatsion</option><option value="academic">Akademik</option><option value="general">Umumiy</option></select></div>
        <div><label class="lbl">Filial</label><select id="nt-b"><option value="fergana">Farg'ona</option><option value="namangan">Namangan</option><option value="both">Ikkala filial</option></select></div>
      </div>
      <label class="lbl">Xodimga biriktirish</label>
      <select id="nt-a" class="mb12"><option value="">— Tanlang —</option>${S.users.filter(u=>u.role!=="admin").map(u=>`<option value="${u.id}">${u.name} (${BRANCH[u.branch]})</option>`).join("")}</select>
      <div class="fc gap8"><button class="btn-p" onclick="addTask()"><i class="ti ti-check"></i> Saqlash</button><button onclick="showAddTask=false;showTab('tasks')">Bekor</button></div>
    </div>`;
  }

  const shownCats=taskFilter==="all"?["marketing","operation","academic","general"]:[taskFilter];
  let taskHtml=shownCats.map(cat=>{
    const items=myTasks.filter(t=>t.cat===cat);
    if(!items.length) return"";
    const dc=items.filter(t=>t.status==="done").length;
    return`<div class="mb16">
      <div class="fc gap8 mb8">
        ${badge(CAT_COL[cat],CAT[cat])}
        <span style="font-size:12px;color:var(--text2)">${dc}/${items.length} bajarildi</span>
        <div class="pg-track" style="width:80px"><div class="pg-fill" style="width:${pct(dc,items.length)}%;background:${pgCol(pct(dc,items.length))}"></div></div>
      </div>
      <div class="card" style="padding:0">
        ${items.map((t,i)=>{
          const au=S.users.find(u=>u.id===t.assignee);
          const done=t.status==="done";
          const canAct=!done&&(isAdm()||(t.assignee===CU.id));
          return`<div style="padding:12px 16px;border-bottom:${i===items.length-1?"none":"1px solid rgba(0,0,0,0.06)"}">
            <div class="fc gap10">
              <div onclick="${canAct?`openSM('${t.id}')`:""}" style="width:20px;height:20px;border:${done?"none":"2px solid rgba(0,0,0,0.2)"};border-radius:5px;background:${done?"var(--purple)":"transparent"};display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:${canAct?"pointer":"default"};transition:all 0.2s">
                ${done?`<i class="ti ti-check" style="font-size:12px;color:#fff"></i>`:""}
              </div>
              <div style="flex:1;min-width:0">
                <div style="font-size:13px;color:${done?"var(--text2)":"var(--text)"};text-decoration:${done?"line-through":"none"}">${t.title}</div>
                <div class="fc gap6" style="margin-top:5px;flex-wrap:wrap">
                  ${branchBadge(t.branch)}
                  <span style="font-size:11px;color:var(--text2)"><i class="ti ti-user" style="font-size:11px"></i> ${au?.name||"Biriktirilmagan"}</span>
                  ${t.story.length?`<span style="font-size:11px;color:var(--purple);cursor:pointer" onclick="viewST('${t.id}')"><i class="ti ti-history" style="font-size:11px"></i> ${t.story.length} yozuv</span>`:""}
                </div>
              </div>
              ${badge(done?"green":"amber",done?"Bajarildi":"Jarayonda")}
            </div>
          </div>`;
        }).join("")}
      </div>
    </div>`;
  }).join("");

  let modal="";
  if(storyTaskId){
    const t=S.tasks.find(t=>t.id===storyTaskId);
    modal=`<div class="overlay">
      <div style="font-size:13px;font-weight:600;margin-bottom:10px"><i class="ti ti-pencil" style="color:var(--purple)"></i> "${t?.title}" — yakunlash</div>
      <label class="lbl" style="margin-top:0">Nima qildingiz? Natija qanday?</label>
      <textarea id="sn" placeholder="Batafsil yozing..."></textarea>
      <div class="fc gap8" style="margin-top:10px">
        <button class="btn-p" onclick="submitSM()"><i class="ti ti-check"></i> Bajarildi deb belgilash</button>
        <button onclick="storyTaskId=null;showTab('tasks')">Bekor</button>
      </div>
    </div>`;
  }
  if(viewStoryId){
    const t=S.tasks.find(t=>t.id===viewStoryId);
    modal=`<div class="overlay">
      <div style="font-size:13px;font-weight:600;margin-bottom:12px"><i class="ti ti-history" style="color:var(--purple)"></i> "${t?.title}" — tarix</div>
      ${t?.story.length?t.story.map(s=>{const u=S.users.find(u=>u.id===s.by);return`<div class="fc gap10 mb8">${av(u?.name||"?",28)}<div><div class="fc gap6 mb4" style="flex-wrap:wrap"><span style="font-size:13px;font-weight:500">${u?.name||"?"}</span><span style="font-size:11px;color:var(--text2)">${s.at}</span></div><div class="story-box">${s.note}</div></div></div>`;}).join(""):`<div style="color:var(--text2);font-size:13px;padding:10px 0">Hali yozuv yo'q</div>`}
      <button onclick="viewStoryId=null;showTab('tasks')" style="margin-top:10px"><i class="ti ti-x"></i> Yopish</button>
    </div>`;
  }

  return`<div>
    <div class="fbt mb12" style="flex-wrap:wrap;gap:8px">
      <div class="fc gap6" style="flex-wrap:wrap">${filters}</div>
      ${isAdm()?`<button class="btn-p" onclick="showAddTask=!showAddTask;showTab('tasks')"><i class="ti ti-plus"></i> Yangi vazifa</button>`:""}
    </div>
    ${addForm}${taskHtml}${modal}
  </div>`;
}

function setTF(f){taskFilter=f;storyTaskId=null;viewStoryId=null;showTab("tasks")}
function addTask(){
  const title=document.getElementById("nt-t")?.value.trim();
  if(!title){alert("Vazifa nomini kiriting");return;}
  S.tasks.push({id:uid(),title,cat:document.getElementById("nt-c").value,branch:document.getElementById("nt-b").value,assignee:document.getElementById("nt-a").value,status:"open",createdBy:CU.id,story:[]});
  saveState();showAddTask=false;showTab("tasks");
}
function openSM(id){storyTaskId=id;viewStoryId=null;showTab("tasks")}
function viewST(id){viewStoryId=id;storyTaskId=null;showTab("tasks")}
function submitSM(){
  const note=document.getElementById("sn")?.value.trim();
  if(!note){alert("Izoh yozing");return;}
  const t=S.tasks.find(t=>t.id===storyTaskId);
  if(t){t.story.push({by:CU.id,at:today(),note});t.status="done";}
  saveState();storyTaskId=null;showTab("tasks");
}

// ── DAILY FACTS ────────────────────────────────────────────────────────────
function renderDaily(){
  const vb=vBranches();
  const recent=S.daily.filter(d=>vb.includes(d.branch)).sort((a,b)=>b.date.localeCompare(a.date)).slice(0,30);
  return`<div>
    <div class="card mb16">
      <div style="font-size:13px;font-weight:600;margin-bottom:14px"><i class="ti ti-plus-circle" style="color:var(--purple)"></i> Kunlik natija kiritish</div>
      <div class="g2 mb8">
        <div><label class="lbl">Filial</label><select id="df-br">${vb.map(b=>`<option value="${b}">${BRANCH[b]}</option>`).join("")}</select></div>
        <div><label class="lbl">Hafta</label><select id="df-wk">${[1,2,3,4].map(w=>`<option value="${w}"${w===curWk?" selected":""}>${w}-hafta</option>`).join("")}</select></div>
      </div>
      <div class="g3 mb8">
        <div><label class="lbl">Tashrif (kishi)</label><input type="number" id="df-v" placeholder="9" min="0"/></div>
        <div><label class="lbl">Shartnoma</label><input type="number" id="df-c" placeholder="5" min="0"/></div>
        <div><label class="lbl">To'lov (kishi)</label><input type="number" id="df-p" placeholder="3" min="0"/></div>
      </div>
      <div class="g2 mb12">
        <div><label class="lbl">Tushum (so'm)</label><input type="number" id="df-r" placeholder="10000000" min="0"/></div>
        <div><label class="lbl">Yangi qarz (so'm)</label><input type="number" id="df-d" placeholder="2000000" min="0"/></div>
      </div>
      <div class="fc gap8"><button class="btn-p" onclick="saveDaily()"><i class="ti ti-device-floppy"></i> Saqlash</button><span id="df-ok" class="saved hidden"><i class="ti ti-check-circle"></i> Muvaffaqiyatli saqlandi!</span></div>
    </div>
    <div class="card">
      <div style="font-size:13px;font-weight:600;margin-bottom:10px"><i class="ti ti-table"></i> So'nggi yozuvlar</div>
      <div style="overflow-x:auto">
        <table style="min-width:640px">
          <thead><tr><th>Sana</th><th>Filial</th><th>H</th><th>Tashrif</th><th>Shartnoma</th><th>To'lov</th><th>Tushum</th><th>Qarz</th><th>Xodim</th></tr></thead>
          <tbody>${recent.map(d=>{const u=S.users.find(u=>u.id===d.createdBy);return`<tr>
            <td style="font-weight:500">${d.date}</td>
            <td>${badge(d.branch==="fergana"?"blue":"purple",d.branch==="fergana"?"F":"N")}</td>
            <td style="color:var(--text2)">${d.week}</td>
            <td>${d.visitors}</td><td>${d.contracts}</td><td>${d.payments}</td>
            <td style="color:#0F6E56;font-weight:600">${fmt(d.revenue)}</td>
            <td style="color:#A32D2D;font-weight:500">${fmt(d.debt)}</td>
            <td style="color:var(--text2)">${u?.name||"—"}</td>
          </tr>`;}).join("")}</tbody>
        </table>
      </div>
    </div>
  </div>`;
}
function saveDaily(){
  const v=parseInt(document.getElementById("df-v")?.value)||0;
  if(!v){alert("Kamida tashrif sonini kiriting");return;}
  S.daily.push({id:uid(),date:today(),branch:document.getElementById("df-br").value,week:parseInt(document.getElementById("df-wk").value)||curWk,visitors:v,contracts:parseInt(document.getElementById("df-c")?.value)||0,payments:parseInt(document.getElementById("df-p")?.value)||0,revenue:parseFloat(document.getElementById("df-r")?.value)||0,debt:parseFloat(document.getElementById("df-d")?.value)||0,createdBy:CU.id});
  saveState();
  const ok=document.getElementById("df-ok");ok.classList.remove("hidden");setTimeout(()=>ok.classList.add("hidden"),2500);
  ["df-v","df-c","df-p","df-r","df-d"].forEach(id=>{const el=document.getElementById(id);if(el)el.value="";});
}

// ── PLANS ──────────────────────────────────────────────────────────────────
function renderPlans(){
  const mon=`2025-${String(planMon+1).padStart(2,"0")}`;
  const vb=vBranches();
  const monBtns=MONTHS.map((m,i)=>`<button class="chip${planMon===i?" on":""}" onclick="planMon=${i};showTab('plans')">${m}</button>`).join("");
  const flds=[{k:"visitors",l:"Oylik tashrif maqsadi (kishi)"},{k:"contracts",l:"Oylik shartnoma maqsadi"},{k:"revenue",l:"Oylik tushum maqsadi (so'm)"}];
  const forms=vb.map(br=>`<div class="card mb12">
    <div style="font-size:13px;font-weight:600;margin-bottom:12px">${BRANCH[br]} — ${MONTHS[planMon]} ${new Date().getFullYear()} rejasi</div>
    ${flds.map(f=>`<div><label class="lbl">${f.l}</label><input type="number" id="pl-${br}-${f.k}" placeholder="Joriy: ${S.plans[`${br}-${mon}-${f.k}`]||'kiritilmagan'}" /></div>`).join("")}
  </div>`).join("");
  return`<div>
    <div class="card mb12"><div style="font-size:13px;font-weight:600;margin-bottom:10px"><i class="ti ti-calendar" style="color:var(--purple)"></i> Oy tanlang</div><div style="display:flex;flex-wrap:wrap;gap:6px">${monBtns}</div></div>
    ${forms}
    <div class="fc gap8"><button class="btn-p" onclick="savePlans('${mon}')"><i class="ti ti-device-floppy"></i> Rejalarni saqlash</button><span id="pl-ok" class="saved hidden"><i class="ti ti-check-circle"></i> Saqlandi!</span></div>
  </div>`;
}
function savePlans(mon){
  for(const br of vBranches()){
    for(const k of["visitors","contracts","revenue"]){
      const el=document.getElementById(`pl-${br}-${k}`);
      if(el?.value) S.plans[`${br}-${mon}-${k}`]=parseFloat(el.value)||0;
    }
  }
  saveState();
  const ok=document.getElementById("pl-ok");ok.classList.remove("hidden");setTimeout(()=>ok.classList.add("hidden"),2500);
}

// ── USERS ──────────────────────────────────────────────────────────────────
function renderUsers(){
  let addForm="";
  if(showAddUser){
    addForm=`<div class="card mb12" style="border-color:var(--purple)">
      <div style="font-size:13px;font-weight:600;margin-bottom:12px"><i class="ti ti-user-plus" style="color:var(--purple)"></i> Yangi xodim — login va parol berish</div>
      <div class="g2 mb8">
        <div><label class="lbl">Login ID (unikal, lotin)</label><input id="nu-id" placeholder="u6, dilnoza1..."/></div>
        <div><label class="lbl">Parol</label><input id="nu-pass" placeholder="kamida 4 ta belgi"/></div>
      </div>
      <div class="g2 mb8">
        <div><label class="lbl">Ism Familiya</label><input id="nu-name" placeholder="Ism Familiya"/></div>
        <div><label class="lbl">Filial</label><select id="nu-br"><option value="fergana">Farg'ona</option><option value="namangan">Namangan</option><option value="both">Ikkala filial</option></select></div>
      </div>
      <div class="mb12"><label class="lbl">Rol</label><select id="nu-role"><option value="staff">Xodim (faqat o'z vazifalari)</option><option value="manager">Menejer (filial statistikasi)</option><option value="admin">Admin (hamma narsa)</option></select></div>
      <div class="fc gap8"><button class="btn-p" onclick="addUser()"><i class="ti ti-check"></i> Qo'shish</button><button onclick="showAddUser=false;showTab('users')">Bekor</button></div>
    </div>`;
  }
  return`<div>
    <div class="fbt mb12">
      <div style="font-size:15px;font-weight:600">Xodimlar (${S.users.length} ta)</div>
      <button class="btn-p" onclick="showAddUser=!showAddUser;showTab('users')"><i class="ti ti-user-plus"></i> Yangi xodim</button>
    </div>
    ${addForm}
    <div class="card" style="padding:0">
      ${S.users.map((u,i)=>`<div style="padding:14px 16px;border-bottom:${i===S.users.length-1?"none":"1px solid rgba(0,0,0,0.06)"}">
        <div class="fc gap12">
          ${av(u.name,38)}
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:600;margin-bottom:2px">${u.name}</div>
            <div style="font-size:11px;color:var(--text2)">Login: <b style="color:var(--purple)">${u.id}</b> &nbsp;·&nbsp; Parol: <b>${u.pass}</b></div>
          </div>
          ${badge(u.branch==="fergana"?"blue":u.branch==="namangan"?"purple":"green",BRANCH[u.branch]||u.branch)}
          ${badge(ROLE_COL[u.role]||"gray",u.role)}
        </div>
      </div>`).join("")}
    </div>
  </div>`;
}
function addUser(){
  const id=document.getElementById("nu-id")?.value.trim();
  const name=document.getElementById("nu-name")?.value.trim();
  const pass=document.getElementById("nu-pass")?.value;
  if(!id||!name||!pass){alert("Barcha maydonlarni to'ldiring");return;}
  if(S.users.find(u=>u.id===id)){alert("Bu login ID allaqachon bor, boshqa tanlang");return;}
  S.users.push({id,name,pass,role:document.getElementById("nu-role").value,branch:document.getElementById("nu-br").value});
  saveState();showAddUser=false;showTab("users");
}

// ── STORY ──────────────────────────────────────────────────────────────────
function renderStory(){
  const tasks=isAdm()?S.tasks:S.tasks.filter(t=>t.assignee===CU.id||t.createdBy===CU.id);
  const all=tasks.flatMap(t=>t.story.map(s=>({...s,tt:t.title,tc:t.cat,tb:t.branch}))).sort((a,b)=>b.at.localeCompare(a.at));
  if(!all.length) return`<div class="card"><div style="text-align:center;padding:32px;color:var(--text2)"><i class="ti ti-history" style="font-size:32px;margin-bottom:8px;display:block"></i>Hali bajarilgan ish yozuvlari yo'q</div></div>`;
  return`<div>
    <div class="fbt mb12"><div style="font-size:15px;font-weight:600">Bajarilgan ishlar tarixi</div><span class="badge b-purple">${all.length} ta yozuv</span></div>
    <div class="card" style="padding:0">
      ${all.map((e,i)=>{const u=S.users.find(u=>u.id===e.by);return`<div style="padding:14px 16px;border-bottom:${i===all.length-1?"none":"1px solid rgba(0,0,0,0.06)"}">
        <div class="fc gap10">
          ${av(u?.name||"?",34)}
          <div style="flex:1;min-width:0">
            <div class="fc gap8 mb4" style="flex-wrap:wrap">
              <span style="font-size:13px;font-weight:600">${u?.name||"?"}</span>
              <span style="font-size:11px;color:var(--text2)"><i class="ti ti-clock" style="font-size:11px"></i> ${e.at}</span>
              ${badge(CAT_COL[e.tc],CAT[e.tc])}
              ${branchBadge(e.tb)}
            </div>
            <div style="font-size:12px;color:var(--text2);margin-bottom:6px">Vazifa: <b>${e.tt}</b></div>
            <div class="story-box">${e.note}</div>
          </div>
          <i class="ti ti-circle-check-filled" style="color:var(--green);font-size:18px;flex-shrink:0"></i>
        </div>
      </div>`;}).join("")}
    </div>
  </div>`;
}
</script>
</body>
</html>
